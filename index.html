<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Landing Page Premium</title>
</head>
<body style="font-family: Arial; text-align:center; padding:50px;">

<h1>Création Landing Page Premium</h1>
<p>Recevez une landing page optimisée conversion.</p>

<form id="form">
<input type="text" id="nom" placeholder="Nom" required><br><br>
<input type="email" id="email" placeholder="Email" required><br><br>
<input type="tel" id="telephone" placeholder="Téléphone"><br><br>
<button type="submit">Envoyer</button>
</form>

<p id="message" style="color:green;"></p>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
e.preventDefault();

fetch("https://hooks.zapier.com/hooks/catch/26582458/u0wuaju/", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
nom: document.getElementById("nom").value,
email: document.getElementById("email").value,
telephone: document.getElementById("telephone").value
})
})
.then(response => {
if (response.ok) {
document.getElementById("message").innerText = "Merci ! Votre demande a été envoyée.";
document.getElementById("form").reset();
} else {
throw new Error("Network response was not ok");
}
})
.catch(error => {
console.error("Erreur:", error);
document.getElementById("message").innerText = "Erreur d'envoi.";
});
});
</script>

</body>
</html>
